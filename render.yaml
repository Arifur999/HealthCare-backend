services:
  - type: web
    name: healthcare-backend
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm prisma generate && pnpm build
    startCommand: pnpm prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRATION
        value: 1d
      - key: REFRESH_TOKEN_EXPIRATION
        value: 7d
      - key: BETTER_AUTH_SESSION_EXPIRATION
        value: 7d
      - key: BETTER_AUTH_SESSION_TOKEN_UPDATE_AGE
        value: 1d
      - key: EMAIL_SENDER_SMTP_USER
        sync: false
      - key: EMAIL_SENDER_SMTP_PASS
        sync: false
      - key: EMAIL_SENDER_SMTP_HOST
        sync: false
      - key: EMAIL_SENDER_SMTP_PORT
        sync: false
      - key: EMAIL_SENDER_SMTP_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_EMBEDDINGS_MODEL
        sync: false
      - key: OPENROUTER_LLM_MODEL
        sync: false
